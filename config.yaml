# =============================================================================
# LabOS NAT Server -- Agent Configuration
#
# Edit this file then run: python configure.py
# Then: docker compose up -d
# =============================================================================

nat:
  host: 0.0.0.0
  port: 8002

  video:
    mode: video_stream                  # websocket | rtsp_pull | mediamtx_relay | video_stream
    mediamtx_url: rtsp://localhost:8554

  forward_audio: false

  interject_error: false  # true = overlay + TTS on VLM errors; false = inline on step panel

  session:
    context_window_tokens: 6000
    max_turns: 10
    history_limit: 40
    summarize_trigger_tokens: 7000
    summary_target_tokens: 600

  vsop:
    provider: gemini_custom_manage
    protocols_dir: protocols
    polling_interval: 5
    multi_frame:
      count: 5
      window_seconds: 10
      resolution: 512
      jpeg_quality: 70

  gemini_custom_manage:
    enabled: true                         # master switch
    mode: full                            # full | vision_only
    model: gemini-3.1-flash-lite-preview
    api_key: "${GOOGLE_API_KEY}"
    monitoring_frames: 20                 # frames per monitoring poll
    monitoring_window_seconds: 30         # seconds of video to sample per poll
    monitoring_interval: 10               # seconds between monitoring polls
    chat_frames: 5                        # frames attached to user chat messages

  labos_live:
    enabled: true                        # master switch -- activated by QR code payload
    initial_qr_code: true                # show QR scanning prompt on XR startup
    website_base_url: "ws://100.101.13.72:18800"            # fallback URL if QR ws_endpoint fails (e.g. "wss://labos.example.com")
    api_base: "http://100.101.13.72:18800"  # LabOS backend URL reachable from this machine (VPN IP)

  tools:
    vlm: { enabled: true }
    vsop: { enabled: true }
    web: { enabled: true }
    code: { enabled: true }
    datetime: { enabled: true }

# ---------------------------------------------------------------------------
# Model endpoints -- point to labos-models GPU server
# ---------------------------------------------------------------------------
models:
  # Legacy key kept for backward compat; fast_llm is the canonical name
  llm:
    base_url: "http://llm:8001/v1"
    model: Qwen/Qwen3-32B-AWQ
    api_key: not-needed
    max_model_len: 8096

  # Fast LLM -- Qwen local model for STELLA monitoring loop, quick verify, filtering
  fast_llm:
    provider: openai_compat
    base_url: "http://llm:8001/v1"
    model: Qwen/Qwen3-32B-AWQ
    api_key: not-needed

  # Reason LLM -- Gemini for main agent chat, protocol context, question answering, tools
  reason_llm:
    provider: gemini_openai_compat
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
    model: gemini-2.5-flash
    api_key: "${GOOGLE_API_KEY}"

  vlm:
    base_url: "http://vlm:8500/v1"
    model: Zaixi/STELLA-VLM-32b
    api_key: not-needed
    max_model_len: 8096

secrets_file: .env.secrets
